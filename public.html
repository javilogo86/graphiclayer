<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Live Match</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #111, #000);
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* CONTAINER */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* TEAMS */
.teams {
  font-size: 60px;
  font-weight: bold;
  letter-spacing: 2px;
  opacity: 0.9;
}

/* SCORE BROADCAST */
.score {
  font-size: 140px;
  font-weight: 900;
  margin: 20px;
  color: #fff;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* TIMER */
.time {
  font-size: 60px;
  color: #00ffcc;
  text-shadow: 0 0 20px #00ffcc;
  margin-top: 10px;
}

/* LIVE INDICATOR */
.live {
  position: absolute;
  top: 20px;
  right: 20px;
  background: red;
  padding: 8px 14px;
  border-radius: 6px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>
</head>

<body>

<div class="live">🔴 LIVE</div>

<div class="container">
  <div class="teams" id="teams">Team A vs Team B</div>
  <div class="score" id="score">0 - 0</div>
  <div class="time" id="time">00:00</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);
const matchRef = ref(db, "match");

const teamsEl = document.getElementById("teams");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

let data = null;

function format(ms){
  const s = Math.floor(ms/1000);
  return String(Math.floor(s/60)).padStart(2,'0') + ":" + String(s%60).padStart(2,'0');
}

onValue(matchRef, snap => {
  data = snap.val();
  if(!data) return;

  teamsEl.innerText = `${data.teamA || "-"} vs ${data.teamB || "-"}`;
  scoreEl.innerText = `${data.scoreA || 0} - ${data.scoreB || 0}`;
});

setInterval(() => {
  if(!data) return;

  let t = data.elapsed || 0;

  if(data.isRunning && data.startTime){
    t += Date.now() - data.startTime;
  }

  timeEl.innerText = format(t);

}, 100);

</script>

</body>
</html>
