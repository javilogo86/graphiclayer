<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marcador</title>

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }
.teams { font-size:40px; margin-top:40px; }
.score { font-size:80px; margin:20px; }
.time { font-size:50px; color:#ccc; }
</style>
</head>

<body>

<div class="teams">
  <span id="teamA">-</span> vs <span id="teamB">-</span>
</div>

<div class="score" id="score">0 - 0</div>
<div class="time" id="time">00:00</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);
const matchRef = ref(db,"match");

const tA=document.getElementById("teamA");
const tB=document.getElementById("teamB");
const score=document.getElementById("score");
const time=document.getElementById("time");

  let matchData = null;

/* FORMATO TIEMPO */
function format(ms){
  const s = Math.floor(ms/1000);
  const m = String(Math.floor(s/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return `${m}:${sec}`;
}

/* ESCUCHAR FIREBASE */
onValue(matchRef, snap=>{
  matchData = snap.val();
  if(!matchData) return;

  // SOLO datos estáticos
  if(tA) tA.innerText = matchData.teamA || "-";
  if(tB) tB.innerText = matchData.teamB || "-";

  score.innerText = `${matchData.scoreA||0} - ${matchData.scoreB||0}`;
});
  /* ⏱️ RENDER EN TIEMPO REAL */
setInterval(()=>{
  if(!matchData) return;

  let t = matchData.elapsed || 0;

  if(matchData.isRunning && matchData.startTime){
    t += Date.now() - matchData.startTime;
  }

  time.innerText = format(t);

}, 1000);

</script>
</body>
</html>
