<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay Champions</title>

<style>
html,
body{
  margin:0;
  padding:0;
  background:transparent;
  overflow:hidden;
  font-family:Arial;
}

.overlay{
  position:absolute;
  top:30px;
  left:30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top-row{
  display:flex;
  align-items:center;
}

.time-box{
  background:#f2f2f2;
  color:#111;
  padding:6px 18px;
  font-size:28px;
  font-weight:bold;
}

.score-container{
  position:relative;
  height:52px;
  overflow:hidden;
}

.score-box{
  display:flex;
  align-items:center;

  background:linear-gradient(
    90deg,
    #0a0f5c,
    #1c2ad6
  );

  color:white;

  padding:6px 20px;

  font-size:28px;

  gap:20px;

  transition:all .4s ease;

  opacity:1;
  transform:scale(1);
}

.score-box.hide{
  opacity:0;
  transform:scale(.8);
}

.team{
  width:70px;
  text-align:center;
}

.sep{
  opacity:.4;
}

.period-box{

  background:#111;

  color:white;

  padding:6px 14px;

  font-size:22px;
  font-weight:bold;

  min-width:50px;

  text-align:center;
}

.period-box.hide{
  display:none;
}

.red-bar{
  width:6px;
  height:52px;
  background:red;
}

.goal-overlay{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(
    90deg,
    #ff7b00,
    #ff0000
  );

  color:white;

  font-size:34px;
  font-weight:bold;

  letter-spacing:4px;

  opacity:0;

  transform:scale(1.2);

  transition:all .4s ease;

  pointer-events:none;
}

.goal-overlay.show{
  opacity:1;
  transform:scale(1);
}

/* PENALTIS */
.penalties{
  display:none;

  /* SIN FONDO */
  background:transparent;

  padding:0;

  color:white;
}

.penalties.show{
  display:block;
}

.penalty-row{
  display:flex;
  align-items:center;
  gap:12px;
  margin:8px 0;
}

.penalty-team{
  width:80px;
  font-weight:bold;

  color:white;

  text-shadow:
    0 0 4px black,
    0 0 8px black;
}

.penalty-dots{
  display:flex;
  gap:8px;
}

.dot{
  width:18px;
  height:18px;
  border-radius:50%;

  border:2px solid white;

  background:#555;

  box-shadow:
    0 0 4px rgba(0,0,0,.8);
}

.dot.goal{
  background:#00ff66;
}

.dot.miss{
  background:#ff2222;
}

/* PULSE */
.goal-overlay.show span{
  animation:pulse .6s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }

}
</style>
</head>

<body>

<div class="overlay">

<div class="top-row">

  <div class="time-box" id="time">
    00:00
  </div>

  <div class="score-container">

    <div class="score-box" id="scoreBox">

      <div class="team" id="teamA">
        AAAA
      </div>

      <div>
        <span id="scoreA">0</span>
        <span class="sep">|</span>
        <span id="scoreB">0</span>
      </div>

      <div class="team" id="teamB">
        BBBB
      </div>

    </div>

    <div id="goalOverlay" class="goal-overlay">
      <span>GOOOOOOL</span>
    </div>

  </div>

  <div class="period-box hide" id="periodBox">
    1T
  </div>

  <div class="red-bar"></div>

</div>

<!-- PENALTIS -->
<div class="penalties" id="penaltiesBox">

  <div class="penalty-row">

    <div class="penalty-team" id="penTeamA">
      TEAM A
    </div>

    <div class="penalty-dots" id="dotsA"></div>

  </div>

  <div class="penalty-row">

    <div class="penalty-team" id="penTeamB">
      TEAM B
    </div>

    <div class="penalty-dots" id="dotsB"></div>

  </div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
}
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  databaseURL:
  "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);
const matchRef = ref(db,"match");

const teamAEl =
document.getElementById("teamA");

const teamBEl =
document.getElementById("teamB");

const scoreAEl =
document.getElementById("scoreA");

const scoreBEl =
document.getElementById("scoreB");

const timeEl =
document.getElementById("time");

const periodBox =
document.getElementById("periodBox");

const penaltiesBox =
document.getElementById("penaltiesBox");

const dotsA =
document.getElementById("dotsA");

const dotsB =
document.getElementById("dotsB");

const penTeamA =
document.getElementById("penTeamA");

const penTeamB =
document.getElementById("penTeamB");

let data = null;

function format(ms){

  const s = Math.floor(ms/1000);

  return String(Math.floor(s/60))
    .padStart(2,'0')

    + ":"

    + String(s%60)
    .padStart(2,'0');

}

function short(n){

  return n?.substring(0,4)
    .toUpperCase()

    || "----";

}

function renderPenalties(container,arr){

  container.innerHTML = "";

  arr.forEach(p=>{

    const dot =
    document.createElement("div");

    dot.classList.add("dot");

    if(p === "goal"){
      dot.classList.add("goal");
    }

    if(p === "miss"){
      dot.classList.add("miss");
    }

    container.appendChild(dot);

  });

}

onValue(matchRef, snap=>{

  data = snap.val();

  if(!data) return;

  teamAEl.innerText =
    short(data.teamA);

  teamBEl.innerText =
    short(data.teamB);

  penTeamA.innerText =
    short(data.teamA);

  penTeamB.innerText =
    short(data.teamB);

  scoreAEl.innerText =
    data.scoreA || 0;

  scoreBEl.innerText =
    data.scoreB || 0;

  if(data.periodMode === "halves"){

    periodBox.classList.remove("hide");

    periodBox.innerText =
      data.period || "1T";

  }else{

    periodBox.classList.add("hide");

  }

  /* PENALTIS */
  if(data.penaltiesEnabled){

    penaltiesBox.classList.add("show");

    renderPenalties(
      dotsA,
      data.penaltiesA || []
    );

    renderPenalties(
      dotsB,
      data.penaltiesB || []
    );

  }else{

    penaltiesBox.classList.remove("show");

  }

});

setInterval(()=>{

  if(!data) return;

  let t = data.elapsed || 0;

  if(data.isRunning && data.startTime){

    t += Date.now()
      - data.startTime;

  }

  timeEl.innerText = format(t);

},100);

</script>

</body>
</html>
