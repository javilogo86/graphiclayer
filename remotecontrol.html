<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* =========================
   FUNCIONES DE MARCADOR
========================= */

function goalA(){
  db.ref("match/scoreA").transaction(n => {
    return (typeof n === "number" ? n : 0) + 1;
  }, handleError);
}

function goalB(){
  db.ref("match/scoreB").transaction(n => {
    return (typeof n === "number" ? n : 0) + 1;
  }, handleError);
}

function minusA(){
  db.ref("match/scoreA").transaction(n => {
    const val = (typeof n === "number" ? n : 0) - 1;
    return Math.max(val, 0);
  }, handleError);
}

function minusB(){
  db.ref("match/scoreB").transaction(n => {
    const val = (typeof n === "number" ? n : 0) - 1;
    return Math.max(val, 0);
  }, handleError);
}

function resetGame(){
  db.ref("match").update({
    scoreA: 0,
    scoreB: 0,
    time: 0,
    running: false
  }).catch(handleError);
}

/* =========================
   CRONÓMETRO SINCRONIZADO
========================= */

// IMPORTANTE: el estado running está en Firebase
let intervalId = null;

// Escuchar estado del partido
db.ref("match/running").on("value", snapshot => {
  const running = snapshot.val();

  // Si ya hay un intervalo activo, lo limpiamos
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }

  if (running) {
    intervalId = setInterval(() => {
      db.ref("match/time").transaction(t => {
        return (typeof t === "number" ? t : 0) + 1;
      }, handleError);
    }, 1000);
  }
}, handleError);

/* =========================
   CONTROL DEL CRONO
========================= */

function startTimer(){
  db.ref("match/running").set(true).catch(handleError);
}

function stopTimer(){
  db.ref("match/running").set(false).catch(handleError);
}

/* =========================
   ERROR HANDLER GLOBAL
========================= */

function handleError(error){
  if (error) {
    console.error("Firebase error:", error);
  }
}

</script>
