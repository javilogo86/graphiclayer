<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ESCUCHAR CAMBIOS */
db.ref("match").on("value", snapshot => {
    const data = snapshot.val();

    document.getElementById("teamA").innerText = data.teamA;
    document.getElementById("teamB").innerText = data.teamB;
    document.getElementById("score").innerText = data.scoreA + " - " + data.scoreB;

    let min = String(Math.floor(data.time / 60)).padStart(2, '0');
    let sec = String(data.time % 60).padStart(2, '0');
    document.getElementById("time").innerText = min + ":" + sec;
});
</script>
