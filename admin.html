<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, update, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);
const matchRef = ref(db, "match");

/* ================= FUNCIONES ================= */

window.goalA = () => runTransaction(ref(db,"match/scoreA"), n => (n||0)+1);
window.goalB = () => runTransaction(ref(db,"match/scoreB"), n => (n||0)+1);

window.setTeams = () => {
  update(matchRef, {
    teamA: document.getElementById("teamA").value,
    teamB: document.getElementById("teamB").value
  });
};

window.start = () => {
  update(matchRef, { startTime: Date.now(), isRunning:true });
};

window.pause = () => {
  runTransaction(matchRef, d => {
    if(!d || !d.startTime) return d;
    const now = Date.now();
    return {
      ...d,
      elapsed: (d.elapsed||0)+(now-d.startTime),
      startTime:null,
      isRunning:false
    };
  });
};

window.reset = () => {
  update(matchRef,{
    scoreA:0, scoreB:0,
    elapsed:0, startTime:null,
    isRunning:false
  });
};

/* ================= UI ================= */

const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

// 🔥 IMPORTANTE: estado global
let matchData = null;

/* FORMATO TIEMPO */
function format(ms){
  const s = Math.floor(ms/1000);
  const m = String(Math.floor(s/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return `${m}:${sec}`;
}

/* ESCUCHAR FIREBASE */
onValue(matchRef, snap=>{
  matchData = snap.val(); // 🔥 AQUÍ ESTÁ LA CLAVE
  if(!matchData) return;

  scoreEl.innerText = `${matchData.scoreA||0} - ${matchData.scoreB||0}`;
});

/* ⏱️ RENDER EN TIEMPO REAL */
setInterval(()=>{
  if(!matchData) return;

  let t = matchData.elapsed || 0;

  if(matchData.isRunning && matchData.startTime){
    t += Date.now() - matchData.startTime;
  }

  timeEl.innerText = format(t); // 🔥 corregido

}, 1000);

</script>
