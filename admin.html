<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Árbitro Mobile PRO</title>

<style>

body{
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
  margin:0;
  padding:20px;
}

h1{
  font-size:22px;
}

.score{
  font-size:60px;
  margin:20px 0;
}

.time{
  font-size:40px;
  color:#00ffcc;
}

.period-selector{
  margin:20px 0;
}

select{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:18px;
  box-sizing:border-box;
  margin-top:6px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}

button{
  padding:20px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

.green{background:#28a745;}
.red{background:#dc3545;}
.blue{background:#007bff;}
.gray{background:#444;}
.orange{background:#ff8800;}

input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:6px;
  border:none;
  box-sizing:border-box;
}

.penalty-box{
  margin-top:30px;
  border:2px solid #333;
  border-radius:16px;
  padding:20px;
  display:none;
}

.checkbox-container{
  margin-top:20px;
  background:#1b1b1b;
  padding:16px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  font-size:18px;
}

.checkbox-container input{
  width:24px;
  height:24px;
  margin:0;
}

.goal-player-box{
  margin-top:25px;
  background:#151515;
  border:2px solid #333;
  border-radius:16px;
  padding:20px;
}

.goal-player-title{
  font-size:22px;
  margin-bottom:20px;
  color:#00ffcc;
}

.player-select-row{
  margin-bottom:16px;
  text-align:left;
}

.player-select-row label{
  display:block;
  margin-bottom:8px;
  font-size:16px;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<h1>👨‍⚖️ Árbitro Mobile PRO</h1>

<input id="teamA" placeholder="Equipo A">
<input id="teamB" placeholder="Equipo B">

<button
  class="blue"
  onclick="setTeams()"
>
Guardar equipos
</button>

<div class="period-selector">

<select
  id="periodSelect"
  onchange="setPeriod()"
>
<option value="single">1 Parte</option>
<option value="1T">1T</option>
<option value="2T">2T</option>
</select>

</div>

<div
  class="score"
  id="score"
>
0 - 0
</div>

<div
  class="time"
  id="time"
>
00:00
</div>

<!-- GOLEADORES -->
<div
  class="goal-player-box hidden"
  id="goalPlayerBox"
>

<div class="goal-player-title">
⚽ Goleador RCDE
</div>

<div class="player-select-row">

<label>
Jugador RCDE
</label>

<select id="rcdePlayerSelect">

<option value="">
Seleccionar jugador
</option>

<option value="Gerard Castillejo|https://www.rcdespanyol.com/uploads/_images/employee/3612/resized/143680_backendGallery.png">
Gerard Castillejo
</option>

<option value="Biel López|https://www.rcdespanyol.com/uploads/_images/employee/3613/resized/143681_backendGallery.png">
Biel López
</option>

<option value="Jared García|https://www.rcdespanyol.com/uploads/_images/employee/3614/resized/143682_backendGallery.png">
Jared García
</option>

<option value="Thiago Oliva|https://www.rcdespanyol.com/uploads/_images/employee/3615/resized/143683_backendGallery.png">
Thiago Oliva
</option>

<option value="Álvaro Pérez|https://www.rcdespanyol.com/uploads/_images/employee/3617/resized/143684_backendGallery.png">
Álvaro Pérez
</option>

<option value="Jaume Delgado|https://www.rcdespanyol.com/uploads/_images/employee/3618/resized/143685_backendGallery.png">
Jaume Delgado
</option>

<option value="Hugo López|https://www.rcdespanyol.com/uploads/_images/employee/4054/resized/143686_backendGallery.png">
Hugo López
</option>

<option value="Modric Márquez|https://www.rcdespanyol.com/uploads/_images/employee/3620/resized/143687_backendGallery.png">
Modric Márquez
</option>

<option value="Sergio R.|https://www.rcdespanyol.com/uploads/_images/employee/3733/resized/143688_backendGallery.png">
Sergio R.
</option>

<option value="Felipe|https://www.rcdespanyol.com/uploads/_images/employee/4053/resized/143689_backendGallery.png">
Felipe
</option>

<option value="Eros Forzinetti|https://www.rcdespanyol.com/uploads/_images/employee/3621/resized/143690_backendGallery.png">
Eros Forzinetti
</option>

<option value="Xavi Alguersuari|https://www.rcdespanyol.com/uploads/_images/employee/3622/resized/143691_backendGallery.png">
Xavi Alguersuari
</option>

</select>

</div>

</div>

<div class="grid">

<button
  class="green"
  onclick="goalA()"
>
+ A
</button>

<button
  class="green"
  onclick="goalB()"
>
+ B
</button>

<button
  class="red"
  onclick="minusA()"
>
- A
</button>

<button
  class="red"
  onclick="minusB()"
>
- B
</button>

<button
  class="blue"
  onclick="start()"
>
▶ Start
</button>

<button
  class="red"
  onclick="pause()"
>
⏸ Pause
</button>

<button
  class="gray"
  onclick="reset()"
>
Reset
</button>

<button
  class="gray"
  onclick="resetTime()"
>
Reset Time
</button>

</div>

<!-- PENALTIS -->
<div class="checkbox-container">

<input
  type="checkbox"
  id="enablePenalties"
  onchange="togglePenaltyControls()"
>

<label for="enablePenalties">
⚽ Habilitar Penaltis
</label>

</div>

<div
  class="penalty-box"
  id="penaltyBox"
>

<h2>
⚽ Tanda de Penaltis
</h2>

<div class="grid">

<button
  class="gray"
  onclick="resetPenalties()"
>
Reset Penaltis
</button>

<button
  class="orange"
  onclick="hidePenalties()"
>
Ocultar Penaltis
</button>

<button
  class="green"
  onclick="penaltyGoalA()"
>
Gol A
</button>

<button
  class="red"
  onclick="penaltyMissA()"
>
Fallo A
</button>

<button
  class="green"
  onclick="penaltyGoalB()"
>
Gol B
</button>

<button
  class="red"
  onclick="penaltyMissB()"
>
Fallo B
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
  getDatabase,
  ref,
  update,
  runTransaction,
  onValue,
  get
}
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  databaseURL:
  "https://marcador-3de21-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

const matchRef = ref(db,"match");

/* UI */
const scoreEl =
  document.getElementById("score");

const timeEl =
  document.getElementById("time");

const goalPlayerBox =
  document.getElementById("goalPlayerBox");

let data = null;

/* EVENTO */
function newEvent(){

  return Date.now()
    + "-"
    + Math.random().toString(16).slice(2);

}

/* DETECTAR RCDE */
function detectRCDETeam(){

  const teamA =
    document.getElementById("teamA").value
    .trim()
    .toUpperCase();

  const teamB =
    document.getElementById("teamB").value
    .trim()
    .toUpperCase();

  if(teamA.includes("RCDE")){
    return "A";
  }

  if(teamB.includes("RCDE")){
    return "B";
  }

  return null;

}

/* MOSTRAR SELECT RCDE */
function updateRCDESelector(){

  const rcdeTeam =
    detectRCDETeam();

  if(rcdeTeam){

    goalPlayerBox.classList.remove("hidden");

  }else{

    goalPlayerBox.classList.add("hidden");

  }

}

/* PERIODO */
window.setPeriod = () => {

  const value =
    document.getElementById("periodSelect").value;

  if(value === "single"){

    update(matchRef,{
      periodMode:"single",
      period:null
    });

  }else{

    update(matchRef,{
      periodMode:"halves",
      period:value
    });

  }

};

/* OBTENER JUGADOR RCDE */
function getSelectedPlayer(){

  const selected =
    document.getElementById("rcdePlayerSelect").value;

  if(!selected) return null;

  const parts =
    selected.split("|");

  return {
    name:parts[0],
    photo:parts[1]
  };

}

/* GOL A */
window.goalA = async () => {

  const rcdeTeam =
    detectRCDETeam();

  let playerData = null;

  if(rcdeTeam === "A"){
    playerData = getSelectedPlayer();
  }

  await runTransaction(
    ref(db,"match/scoreA"),
    n => (n||0)+1
  );

  update(matchRef,{
    lastEvent:{
      id:newEvent(),
      type:"goal",
      team:"A",
      player:playerData
    }
  });

};

/* GOL B */
window.goalB = async () => {

  const rcdeTeam =
    detectRCDETeam();

  let playerData = null;

  if(rcdeTeam === "B"){
    playerData = getSelectedPlayer();
  }

  await runTransaction(
    ref(db,"match/scoreB"),
    n => (n||0)+1
  );

  update(matchRef,{
    lastEvent:{
      id:newEvent(),
      type:"goal",
      team:"B",
      player:playerData
    }
  });

};

/* RESTAR */
window.minusA = () =>
  runTransaction(
    ref(db,"match/scoreA"),
    n => Math.max((n||0)-1,0)
  );

window.minusB = () =>
  runTransaction(
    ref(db,"match/scoreB"),
    n => Math.max((n||0)-1,0)
  );

/* EQUIPOS */
window.setTeams = () => {

  const teamA =
    document.getElementById("teamA").value;

  const teamB =
    document.getElementById("teamB").value;

  update(matchRef,{
    teamA,
    teamB
  });

  updateRCDESelector();

};

/* TIMER */
window.start = () => {

  update(matchRef,{
    startTime:Date.now(),
    isRunning:true
  });

};

window.pause = async () => {

  const snap =
    await get(matchRef);

  const d =
    snap.val();

  const now =
    Date.now();

  update(matchRef,{
    elapsed:
      (d.elapsed||0)
      + (now-d.startTime),

    startTime:null,
    isRunning:false
  });

};

/* RESET */
window.reset = () => {

  update(matchRef,{
    scoreA:0,
    scoreB:0,
    elapsed:0,
    startTime:null,
    isRunning:false,
    lastEvent:null,
    penaltiesEnabled:false,
    penaltiesA:[],
    penaltiesB:[]
  });

};

/* RESET TIEMPO */
window.resetTime = () => {

  update(matchRef,{
    elapsed:0,
    startTime:null,
    isRunning:false
  });

};

/* PENALTIS */
window.togglePenaltyControls = async () => {

  const enabled =
    document.getElementById("enablePenalties").checked;

  document.getElementById("penaltyBox").style.display =
    enabled ? "block" : "none";

  update(matchRef,{
    penaltiesEnabled:enabled
  });

};

window.hidePenalties = () => {

  document.getElementById("enablePenalties").checked =
    false;

  document.getElementById("penaltyBox").style.display =
    "none";

  update(matchRef,{
    penaltiesEnabled:false
  });

};

window.resetPenalties = () => {

  update(matchRef,{
    penaltiesEnabled:false,
    penaltiesA:[],
    penaltiesB:[]
  });

  document.getElementById("enablePenalties").checked =
    false;

  document.getElementById("penaltyBox").style.display =
    "none";

};

window.penaltyGoalA = async () => {

  const snap =
    await get(matchRef);

  const arr =
    snap.val()?.penaltiesA || [];

  arr.push("goal");

  update(matchRef,{
    penaltiesEnabled:true,
    penaltiesA:arr
  });

};

window.penaltyMissA = async () => {

  const snap =
    await get(matchRef);

  const arr =
    snap.val()?.penaltiesA || [];

  arr.push("miss");

  update(matchRef,{
    penaltiesEnabled:true,
    penaltiesA:arr
  });

};

window.penaltyGoalB = async () => {

  const snap =
    await get(matchRef);

  const arr =
    snap.val()?.penaltiesB || [];

  arr.push("goal");

  update(matchRef,{
    penaltiesEnabled:true,
    penaltiesB:arr
  });

};

window.penaltyMissB = async () => {

  const snap =
    await get(matchRef);

  const arr =
    snap.val()?.penaltiesB || [];

  arr.push("miss");

  update(matchRef,{
    penaltiesEnabled:true,
    penaltiesB:arr
  });

};

/* FORMATO TIEMPO */
function format(ms){

  const s =
    Math.floor(ms/1000);

  return String(
    Math.floor(s/60)
  ).padStart(2,'0')
  + ":"
  + String(
    s%60
  ).padStart(2,'0');

}

/* FIREBASE */
onValue(matchRef,snap=>{

  data =
    snap.val();

  if(!data) return;

  scoreEl.innerText =
    `${data.scoreA||0} - ${data.scoreB||0}`;

});

/* TIMER */
setInterval(()=>{

  if(!data) return;

  let t =
    data.elapsed || 0;

  if(
    data.isRunning &&
    data.startTime
  ){

    t +=
      Date.now()
      - data.startTime;

  }

  timeEl.innerText =
    format(t);

},100);

</script>

</body>
</html>
